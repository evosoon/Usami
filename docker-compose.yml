services:
  # === Backend API ===
  backend:
    build: ./backend
    ports:
      - "127.0.0.1:${BACKEND_PORT:-42001}:8000"
    env_file:
      - .env.example
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      litellm:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./config:/app/config
      - backend_venv:/app/.venv
    command: sh -c "uv sync --frozen --no-dev && uv run uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  # === Frontend ===
  frontend:
    build:
      context: ./frontend
      args:
        - BACKEND_INTERNAL_URL=http://backend:8000
        - NEXT_PUBLIC_BACKEND_PORT=${BACKEND_PORT:-42001}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-42000}:3000"
    depends_on:
      - backend

  # === PostgreSQL (持久状态 + Checkpoint + 向量) ===
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-usami}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-usami}
      POSTGRES_DB: ${POSTGRES_DB:-usami}
    # ports:  # 默认不暴露，需要本地 DB 工具连接时取消注释
    #   - "127.0.0.1:${POSTGRES_PORT:-42432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usami"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === Redis (工作记忆 + 事件总线) ===
  redis:
    image: redis:7-alpine
    # ports:  # 默认不暴露，需要本地 redis-cli 连接时取消注释
    #   - "127.0.0.1:${REDIS_PORT:-42379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # === LiteLLM Proxy (Model Router) ===
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "127.0.0.1:${LITELLM_PORT:-42002}:4000"
    volumes:
      - ./config/litellm_config.yaml:/app/config.yaml
    command: --config /app/config.yaml --port 4000
    env_file:
      - .env.example
      - .env
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:4000/')\" || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  # === SearXNG ===
  searxng:
    image: searxng/searxng:latest
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080
    ports:
      - "127.0.0.1:${SEARXNG_PORT:-42080}:8080"
    volumes:
      - ./config/searxng:/etc/searxng
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      - redis

volumes:
  pgdata:
  redisdata:
  backend_venv:
