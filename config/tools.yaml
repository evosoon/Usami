# ================================================
# Tool registration config
# Built-in tools + MCP Server declarations
# ================================================

builtin_tools:
  web_search:
    description: "Search the internet for latest information (via self-hosted SearXNG engine)"
    permission_level: 1  # L1: read-only
    requires_approval: false

  knowledge_search:
    description: "Retrieve relevant information from knowledge base (RAG vector search using pgvector)"
    permission_level: 1
    requires_approval: false

  file_write:
    description: "Write files (restricted to Markdown/JSON/YAML/TXT/CSV, path safety validated)"
    permission_level: 2  # L2: side-effect
    requires_approval: false

# --- MCP Server integration (optional for MVP) ---
mcp_servers: {}
