# ================================================
# Model Router rules
# task_type x complexity -> model_tier
# ================================================

# --- Routing rules ---
routing_rules:
  planning:
    model: "strong"
    description: "Task decomposition, DAG generation, intent understanding"

  research:
    model: "medium"
    description: "Information retrieval, material organization"

  writing:
    model: "strong"
    description: "Report writing, content generation"

  analysis:
    model: "strong"
    description: "Knowledge correlation analysis, insight extraction"

  summarize:
    model: "light"
    description: "Information summarization, state compression"

  classification:
    model: "light"
    description: "Intent classification, routing decisions"

# --- Cost budget (per task) ---
budget:
  max_tokens_per_task: 100000
  max_cost_per_task_usd: 0.50
  alert_threshold: 0.8  # Trigger alert at 80%

# --- Routing logs (data pipeline for future intelligent routing) ---
logging:
  enabled: true
  fields:
    - task_type
    - prompt_tokens
    - completion_tokens
    - model_used
    - latency_ms
    - cost_usd
    - success
    - user_satisfaction  # Future: user feedback
