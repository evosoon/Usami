# Development overrides — auto-merged by `docker compose up`.
# Provides hot-reload for the frontend container.
# Delete or rename this file to use production frontend builds.

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/public:/app/public
      - ./frontend/messages:/app/messages
      - ./frontend/next.config.ts:/app/next.config.ts
    environment:
      - BACKEND_INTERNAL_URL=http://backend:8000
